name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default: nothing here writes to the repository
permissions:
  contents: read

# A newer push supersedes an in-flight run for the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted

          # The rule list, the file list and the analyzer version all live in
          # tools/Invoke-Lint.ps1, which the release gate calls as well. Duplicating any
          # of them here is what let a Warning in tests/ keep main red across a release
          # while the gate reported all green. Installing "latest" here would reopen the
          # same hole from the other side, so ask the script which version it needs.
          $pin = ./tools/Invoke-Lint.ps1 -RequiredAnalyzerVersion
          Install-Module PSScriptAnalyzer -RequiredVersion $pin -Force -Scope CurrentUser

          ./tools/Invoke-Lint.ps1 -FailOnFinding

  syntax:
    name: Syntax Check
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $failed = $false
          $files = @('./WinClean.ps1', './get.ps1', './install.ps1') +
                   (Get-ChildItem ./tools, ./tests -Filter *.ps1 -Recurse | ForEach-Object FullName)

          foreach ($file in $files) {
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$null, [ref]$errors)
            if ($errors) {
              $failed = $true
              Write-Host "::error::Syntax errors in ${file}:"
              $errors | ForEach-Object { Write-Host "  - $_" }
            }
          }

          if ($failed) { exit 1 }
          Write-Host "::notice::Syntax check passed for $($files.Count) file(s)!"

  test:
    name: Pester Tests
    runs-on: windows-latest
    needs: [lint, syntax]

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted

          # The supported range lives in tools/Invoke-Tests.ps1, which the release gate
          # also runs. Repeating the bound here is how CI and the gate drifted apart on
          # the analyzer, so ask the script which range it will accept.
          $range = (./tools/Invoke-Tests.ps1 -RequiredPesterRange) -split ' '
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion $range[0] -MaximumVersion $range[1]

      - name: Run Pester Tests
        shell: pwsh
        run: |
          # Same script, same version bound and same "a skipped test fails the run" rule
          # that tools/Invoke-ReleaseCheck.ps1 applies locally.
          ./tools/Invoke-Tests.ps1 -FailOnProblem -ResultPath ./test-results.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results
          path: ./test-results.xml

  smoke:
    name: Smoke Run
    runs-on: windows-latest
    needs: [lint, syntax]

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # v2.17: the smoke runner checks console box geometry and the result JSON of a
      # real ReportOnly run. It existed since 2.15 but was never wired into CI, so the
      # class of "misaligned frame" bugs could only be caught by hand.
      - name: Run smoke test (ReportOnly)
        shell: pwsh
        run: pwsh -NoProfile -File ./tools/Invoke-SmokeTest.ps1
