name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default: nothing here writes to the repository
permissions:
  contents: read

# A newer push supersedes an in-flight run for the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted

          # The rule list, the file list and the analyzer version all live in
          # tools/Invoke-Lint.ps1, which the release gate calls as well. Duplicating any
          # of them here is what let a Warning in tests/ keep main red across a release
          # while the gate reported all green. Installing "latest" here would reopen the
          # same hole from the other side, so ask the script which version it needs.
          $pin = ./tools/Invoke-Lint.ps1 -RequiredAnalyzerVersion
          Install-Module PSScriptAnalyzer -RequiredVersion $pin -Force -Scope CurrentUser

          ./tools/Invoke-Lint.ps1 -FailOnFinding

  syntax:
    name: Syntax Check
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $failed = $false
          $files = @('./WinClean.ps1', './get.ps1', './install.ps1') +
                   (Get-ChildItem ./tools, ./tests -Filter *.ps1 -Recurse | ForEach-Object FullName)

          foreach ($file in $files) {
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$null, [ref]$errors)
            if ($errors) {
              $failed = $true
              Write-Host "::error::Syntax errors in ${file}:"
              $errors | ForEach-Object { Write-Host "  - $_" }
            }
          }

          if ($failed) { exit 1 }
          Write-Host "::notice::Syntax check passed for $($files.Count) file(s)!"

  test:
    name: Pester Tests
    runs-on: windows-latest
    needs: [lint, syntax]

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          # Upper bound: Pester 6 will change semantics, and it must not arrive silently
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0 -MaximumVersion 5.99.99

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./tests"
          $config.Run.PassThru = $true
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = "NUnitXml"
          $config.TestResult.OutputPath = "./test-results.xml"

          $result = Invoke-Pester -Configuration $config

          # v2.17: skipped tests fail the build. The integration suite silently skips
          # itself without administrator rights, and a green run that verified nothing
          # is worse than a red one. GitHub Windows runners are elevated, so any skip
          # here means something is actually wrong.
          $notRun = $result.SkippedCount + $result.NotRunCount
          if ($notRun -gt 0) {
            Write-Host "::error::$notRun test(s) did not run - integration coverage is missing"
            exit 1
          }
          if ($result.FailedCount -gt 0) {
            Write-Host "::error::$($result.FailedCount) test(s) failed"
            exit 1
          }
          Write-Host "::notice::All $($result.PassedCount) tests passed"

      - name: Upload Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results
          path: ./test-results.xml

  smoke:
    name: Smoke Run
    runs-on: windows-latest
    needs: [lint, syntax]

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # v2.17: the smoke runner checks console box geometry and the result JSON of a
      # real ReportOnly run. It existed since 2.15 but was never wired into CI, so the
      # class of "misaligned frame" bugs could only be caught by hand.
      - name: Run smoke test (ReportOnly)
        shell: pwsh
        run: pwsh -NoProfile -File ./tools/Invoke-SmokeTest.ps1
